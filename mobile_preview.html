<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中铁建设集团 Agent 工作台 - 移动端预览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --iphone-width: 390px;
            --iphone-height: 844px;
            --iphone-radius: 55px;
            --iphone-border: 12px;
        }

        body {
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        /* iPhone Frame */
        .iphone-container {
            position: relative;
            width: calc(var(--iphone-width) + (var(--iphone-border) * 2));
            height: calc(var(--iphone-height) + (var(--iphone-border) * 2));
            background: #1a1a1a;
            border-radius: var(--iphone-radius);
            box-shadow: 
                0 0 0 2px #333,
                0 20px 50px rgba(0,0,0,0.8),
                inset 0 0 2px 2px rgba(255,255,255,0.1);
            padding: var(--iphone-border);
            box-sizing: border-box;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .iphone-container:hover {
            transform: scale(1.02);
        }

        /* Screen */
        .iphone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: calc(var(--iphone-radius) - var(--iphone-border));
            overflow: hidden;
            border: 2px solid #000;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: #000;
            border-radius: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.3s ease;
        }

        .dynamic-island:hover {
            width: 200px;
        }

        /* Iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        /* Side Buttons */
        .button {
            position: absolute;
            background: #222;
            border-radius: 2px;
        }

        .silent-switch { width: 3px; height: 30px; left: -15px; top: 100px; }
        .vol-up { width: 3px; height: 60px; left: -15px; top: 160px; }
        .vol-down { width: 3px; height: 60px; left: -15px; top: 230px; }
        .power { width: 3px; height: 100px; right: -15px; top: 200px; }

        /* Instructions */
        .controls {
            margin-top: 30px;
            text-align: center;
            max-width: 500px;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .url-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 15px;
            border-radius: 10px;
            color: #fff;
            width: 300px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            padding: 8px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="iphone-container">
        <!-- Buttons -->
        <div class="button silent-switch"></div>
        <div class="button vol-up"></div>
        <div class="button vol-down"></div>
        <div class="button power"></div>

        <div class="iphone-screen">
            <div class="dynamic-island"></div>
            <!-- 默认指向本地开发地址或当前预览地址 -->
            <iframe id="preview-frame" src="./index.html"></iframe>
        </div>
    </div>

    <div class="controls">
        <h2 class="text-xl font-bold mb-2">📱 移动端预览模式</h2>
        <p class="text-sm text-slate-400 mb-4">您可以直接在此 iPhone 框架中操作您的应用</p>
        
        <div class="flex flex-col items-center gap-2">
            <input type="text" id="url-input" class="url-input" placeholder="输入预览地址 (如 http://localhost:3000)">
            <button onclick="updateUrl()" class="btn-primary">刷新预览</button>
        </div>

        <div class="hint">
            <p>1. 如果您在本地运行，请确保执行了 <code>npm run dev</code></p>
            <p>2. 然后将地址设置为 <code>http://localhost:3000</code></p>
        </div>
    </div>

    <script>
        // 自动尝试获取当前环境的预览地址
        window.onload = function() {
            const currentUrl = window.location.href;
            const input = document.getElementById('url-input');
            const frame = document.getElementById('preview-frame');
            
            // 如果是在 AI Studio 预览环境中打开
            if (currentUrl.includes('ais-dev') || currentUrl.includes('ais-pre')) {
                const appUrl = currentUrl.split('/').slice(0, 3).join('/') + '/';
                input.value = appUrl;
                frame.src = appUrl;
            } else {
                // 本地默认
                input.value = "http://localhost:3000";
                frame.src = "http://localhost:3000";
            }
        };

        function updateUrl() {
            const url = document.getElementById('url-input').value;
            document.getElementById('preview-frame').src = url;
        }
    </script>
</body>
</html>
